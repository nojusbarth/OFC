image: node:25

stages:
  - test

cache:
  key: npm-cache
  paths:
    - .npm/

test:
  stage: test
  script:
    - npm ci --cache .npm --prefer-offline
    - npm test -- --watchAll=false --ci --reporters=default --reporters=jest-junit
  artifacts:
    when: always
    reports:
      junit: junit.xml
  rules:
    - when: always